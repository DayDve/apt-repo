name: Check updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: App to build (leave empty for all)
        required: false
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: list
        run: |
          if [ -n "${{ inputs.app }}" ]; then
            echo "matrix={\"app\":[\"${{ inputs.app }}\"]}" >> "$GITHUB_OUTPUT"
          else
            apps=$(ls -d apps/*/ | sed 's|apps/||;s|/||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix={\"app\":$apps}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    concurrency:
      group: build-${{ matrix.app }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Get current version
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --repo ${{ github.repository }} --json tagName --jq '.[].tagName' \
            | grep "^${{ matrix.app }}-" | sort -V | tail -1)
          if [ -n "$tag" ]; then
            echo "version=$(echo "$tag" | sed "s/^${{ matrix.app }}-//")" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check update
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f apps/${{ matrix.app }}/package ]; then
            echo "No package for ${{ matrix.app }}, skipping"
            echo "update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          source apps/build.sh
          source apps/${{ matrix.app }}/package
          if check_update "${{ steps.current.outputs.version }}"; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore ayugram ccache
        if: steps.check.outputs.update == 'true' && matrix.app == 'ayugram'
        uses: actions/cache@v6
        with:
          path: apps/ayugram/ccache
          key: ayugram-ccache-${{ hashFiles('apps/ayugram/Dockerfile') }}
          restore-keys: ayugram-ccache-

      - name: Prepare ayugram ccache dir
        if: steps.check.outputs.update == 'true' && matrix.app == 'ayugram'
        run: |
          mkdir -p apps/ayugram/ccache
          chmod 777 apps/ayugram/ccache

      - name: Build
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash apps/build.sh ${{ matrix.app }} "${{ steps.current.outputs.version }}"

      - name: Notify Failure
        if: failure() && steps.check.outputs.update == 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_OWNER_ID: ${{ secrets.TG_OWNER_ID }}
        run: |
          TEXT=$(printf '❌ Build failed: %s\nWorkflow: %s\nRun: %s/%s/actions/runs/%s' \
            "${{ matrix.app }}" \
            "${{ github.workflow }}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          curl -sS \
            --form-string "chat_id=$TG_OWNER_ID" \
            --form-string "text=$TEXT" \
            "https://api.telegram.org/bot$TG_TOKEN/sendMessage" | grep -v '"ok":true'

  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Check if any build happened
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          built=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} --json jobs --jq '
            [.jobs[] | select(.name | startswith("build (")) | .steps[] | select(.name == "Build" and .conclusion == "success")] | length
          ')
          if [ "$built" -gt 0 ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect built apps
        if: steps.check.outputs.deploy == 'true'
        id: apps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apps=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} --json jobs --jq '
            [.jobs[] | select(.name | startswith("build (")) |
             select(.steps[] | select(.name == "Build" and .conclusion == "success")) |
             .name | ltrimstr("build (") | rtrimstr(")")]
          ')
          echo "list=$apps" >> "$GITHUB_OUTPUT"

      - name: Trigger apt repo deploy
        if: steps.check.outputs.deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy-apt.yml --repo ${{ github.repository }} \
            -f changed_apps='${{ steps.apps.outputs.list }}'
