name: Deploy Worker

on:
  push:
    branches: [worker]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: worker

      - name: Deploy apt-repo
        run: |
          args=()
          [ -n "$REPO" ] && args+=(--var "REPO:$REPO")
          [ -n "$PAGES_ORIGIN" ] && args+=(--var "PAGES_ORIGIN:$PAGES_ORIGIN")
          [ -n "$CACHE_BUST" ] && args+=(--var "CACHE_BUST:$CACHE_BUST")
          [ -n "$SITE_NAME" ] && args+=(--var "SITE_NAME:$SITE_NAME")
          [ -n "$AUTHOR" ] && args+=(--var "AUTHOR:$AUTHOR")
          [ -n "$TELEGRAM" ] && args+=(--var "TELEGRAM:$TELEGRAM")
          npx wrangler deploy "${args[@]}"
        working-directory: workers/apt-repo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          REPO: ${{ vars.REPO }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
          CACHE_BUST: ${{ vars.CACHE_BUST }}
          SITE_NAME: ${{ vars.SITE_NAME }}
          AUTHOR: ${{ vars.AUTHOR }}
          TELEGRAM: ${{ vars.TELEGRAM }}

      - name: Deploy gha-proxy
        run: npx wrangler deploy
        working-directory: workers/gha-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
