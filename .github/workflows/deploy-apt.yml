name: Deploy apt repository

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: apt

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Import GPG key
        env:
          KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/gpg.key
          gpg --batch --yes --import /tmp/gpg.key

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/by-tag
          gh release list --repo $GITHUB_REPOSITORY --json tagName --jq '.[].tagName' | while read tag; do
            gh release download "$tag" --repo $GITHUB_REPOSITORY --dir "/tmp/by-tag/$tag" --pattern '*.deb' 2>/dev/null || true
          done

      - name: Save old pool map
        run: |
          cp "$GITHUB_WORKSPACE/pool-map.json" /tmp/pool-map-old.json 2>/dev/null || echo '{}' > /tmp/pool-map-old.json

      - name: Generate Packages
        run: |
          > /tmp/tag-map
          > /tmp/pool-map-entries
          for tag_dir in /tmp/by-tag/*/; do
            [ -d "$tag_dir" ] || continue
            tag=$(basename "$tag_dir")
            for deb in "$tag_dir"*.deb; do
              [ -f "$deb" ] || continue
              name=$(basename "$deb")
              usc=$(echo "$name" | tr -cd '_' | wc -c)
              if [ "$usc" -ge 2 ]; then
                distro=$(echo "$name" | rev | cut -d_ -f2 | rev)
              else
                distro=noble
              fi
              mkdir -p "/tmp/pool/$distro/main"
              cp "$deb" "/tmp/pool/$distro/main/$name"
              echo "$distro|$name|$tag" >> /tmp/tag-map
            done
          done

          for distro_dir in /tmp/pool/*/; do
            [ -d "$distro_dir" ] || continue
            distro=$(basename "$distro_dir")
            [ -z "$(ls "/tmp/pool/$distro/main/"*.deb 2>/dev/null)" ] && continue

            cd "/tmp/pool/$distro"
            dpkg-scanpackages --multiversion main > Packages

            # rewrite Filename to full relative path from repo root
            sed -i "s|^Filename: main/|Filename: pool/$distro/main/|" Packages

            mkdir -p "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64"
            cp Packages "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64/Packages"
            gzip -9kf "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64/Packages"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Generate pool map
        run: |
          echo -n '{' > "$GITHUB_WORKSPACE/pool-map.json"
          first=true
          while IFS='|' read -r _distro deb_name tag; do
            $first || echo -n ',' >> "$GITHUB_WORKSPACE/pool-map.json"
            first=false
            printf '"%s":"%s"' "$deb_name" "$tag" >> "$GITHUB_WORKSPACE/pool-map.json"
          done < /tmp/tag-map
          echo '}' >> "$GITHUB_WORKSPACE/pool-map.json"

      - name: Detect changed apps
        id: changed
        run: |
          jq -r 'to_entries[] | "\(.key)|\(.value)"' "$GITHUB_WORKSPACE/pool-map.json" | while IFS='|' read -r deb tag; do
            old_tag=$(jq -r --arg d "$deb" '.[$d] // ""' /tmp/pool-map-old.json)
            if [ "$tag" != "$old_tag" ]; then
              app=$(echo "$tag" | sed -E 's/-[0-9].*//')
              echo "$app" >> /tmp/changed-apps
            fi
          done
          if [ -f /tmp/changed-apps ]; then
            sort -u /tmp/changed-apps > /tmp/changed-apps-uniq
            echo "count=$(wc -l < /tmp/changed-apps-uniq)" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed apps
        if: steps.changed.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: changed-apps
          path: /tmp/changed-apps-uniq
          retention-days: 1

      - name: Get package info from master
        run: |
          git fetch origin master
          for app in $(git ls-tree --name-only origin/master:apps/ | grep -v '^template$'); do
            pkg_file="origin/master:apps/$app/package"
            url=$(git show "$pkg_file" | awk -F'"' '/^SOURCE_URL=/{print $2}')
            desc=$(git show "$pkg_file" | awk -F'"' '/^DESCRIPTION=/{print $2}')
            [ -n "$url" ] && echo "$app|$url|$desc"
          done > /tmp/pkg-info

      - name: Generate packages.json
        run: |
          echo -n '[' > "$GITHUB_WORKSPACE/packages.json"
          first=true
          while IFS='|' read -r distro deb_name tag; do
            app=$(echo "$tag" | sed -E 's/-[0-9].*//')
            source_url=$(awk -F'|' -v a="$app" '$1==a{print $2}' /tmp/pkg-info)
            desc=$(awk -F'|' -v a="$app" '$1==a{print $3}' /tmp/pkg-info)
            if [ -z "$desc" ]; then
              desc=$(dpkg-deb -f "/tmp/pool/$distro/main/$deb_name" Description 2>/dev/null | head -1 || echo "")
            fi
            $first || echo -n ',' >> "$GITHUB_WORKSPACE/packages.json"
            first=false
            jq -n --arg name "$app" --arg desc "$desc" --arg source "$source_url" '{name:$name,description:$desc,source:$source}' >> "$GITHUB_WORKSPACE/packages.json"
          done < /tmp/tag-map
          echo -n ']' >> "$GITHUB_WORKSPACE/packages.json"

      - name: Generate Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            apt-ftparchive release \
              -o APT::FTPArchive::Release::Origin="DayDve" \
              -o APT::FTPArchive::Release::Label="DayDve apt repo" \
              -o "APT::FTPArchive::Release::Suite=$distro" \
              -o "APT::FTPArchive::Release::Codename=$distro" \
              -o "APT::FTPArchive::Release::Architectures=amd64" \
              -o "APT::FTPArchive::Release::Components=main" \
              "dists/$distro" > "dists/$distro/Release"
          done

      - name: Sign Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            pushd "dists/$distro"
            gpg --batch --yes --detach-sign --armor -o Release.gpg Release
            gpg --batch --yes --clearsign -o InRelease Release
            popd
          done

      - name: Export public key
        run: |
          KEYID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$KEYID" > apt-key.asc

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf dists/noble/main/binary-i386 2>/dev/null || true
          git add -A
          git commit -m "deploy build $GITHUB_RUN_NUMBER"
          git push

      - name: Update README on master
        run: |
          cp "$GITHUB_WORKSPACE/packages.json" /tmp/packages.json
          git fetch origin master
          git checkout master
          python3 scripts/gen_readme.py
          git add README.md
          git diff --cached --quiet || (
            git -c user.name='github-actions' -c user.email='github-actions@github.com' commit -m "auto-update README from packages metadata"
            git push
          )

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_OWNER_ID: ${{ secrets.TG_OWNER_ID }}
        run: |
          TEXT=$(printf '%s\n' \
            '❌ Deploy apt repo failed' \
            "Workflow: ${{ github.workflow }}" \
            "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -sS --fail -F "chat_id=$TG_OWNER_ID" \
            -F "text=$TEXT" \
            "https://api.telegram.org/bot$TG_TOKEN/sendMessage"

  notify-success:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      - name: Download changed apps list
        uses: actions/download-artifact@v4
        with:
          name: changed-apps
          path: /tmp
        continue-on-error: true

      - name: Send notifications
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_OWNER_ID: ${{ secrets.TG_OWNER_ID }}
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/changed-apps-uniq ]; then
            echo "No changed apps, skipping"
            exit 0
          fi

          # Start local Bot API server
          docker run -d --rm \
            -p 8081:8081 \
            --name telegram-bot-api \
            -e TELEGRAM_API_ID="$API_ID" \
            -e TELEGRAM_API_HASH="$API_HASH" \
            aiogram/telegram-bot-api:latest \
            --local

          for i in $(seq 1 30); do
            if curl -s "http://localhost:8081/bot$TG_TOKEN/getMe" > /dev/null 2>&1; then
              echo "Bot API ready"
              break
            fi
            sleep 1
          done

          while read -r app; do
            [ -z "$app" ] && continue

            # Get package metadata from source
            source apps/build.sh
            source "apps/$app/package"
            desc="$DESCRIPTION"
            src="$SOURCE_URL"

            # Get latest release info
            tag=$(gh release list --repo ${{ github.repository }} --json tagName --jq '.[].tagName' \
              | grep "^${app}-" | sort -V | tail -1)
            [ -z "$tag" ] && continue
            ver=$(echo "$tag" | sed "s/^${app}-//")

            body=$(gh release view "$tag" --repo ${{ github.repository }} --json body --jq '.body')

            # Download .deb
            rm -rf /tmp/deb-notify
            mkdir -p /tmp/deb-notify
            gh release download "$tag" --repo ${{ github.repository }} \
              --pattern '*.deb' --dir /tmp/deb-notify 2>/dev/null || continue

            deb=$(ls /tmp/deb-notify/*.deb 2>/dev/null | head -1)
            [ -z "$deb" ] && continue

            # Build caption
            caption=$(printf '<b>%s %s</b>\n%s\n<a href="%s">Разработчик</a>\n\n%s\n\n📦 <code>apt install %s</code>' \
              "$app" "$ver" "$desc" "$src" "$body" "$app")

            # Send
            curl -sS --fail \
              -F "chat_id=$TG_CHAT_ID" \
              -F "document=@$deb" \
              -F "caption=$caption" \
              -F "parse_mode=HTML" \
              "http://localhost:8081/bot$TG_TOKEN/sendDocument"

            rm -rf /tmp/deb-notify
          done < /tmp/changed-apps-uniq

          docker kill telegram-bot-api || true
