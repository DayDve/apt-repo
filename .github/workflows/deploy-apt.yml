name: Deploy apt repository

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: apt

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Import GPG key
        env:
          KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/gpg.key
          gpg --batch --yes --import /tmp/gpg.key

      - name: Clean old apt metadata
        run: |
          rm -rf dists pool

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/releases
          gh release list --repo $GITHUB_REPOSITORY --json tagName --jq '.[].tagName' | while read tag; do
            gh release download "$tag" --repo $GITHUB_REPOSITORY --dir "/tmp/releases/$tag" --pattern '*.deb' 2>/dev/null || true
          done
          mkdir -p pool
          find /tmp/releases -name '*.deb' | while read f; do
            distro=$(basename "$f" .deb | rev | cut -d_ -f2 | rev)
            mkdir -p "pool/$distro/main"
            cp "$f" "pool/$distro/main/"
          done

      - name: Generate Packages
        run: |
          for distro in pool/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            [ -z "$(ls "pool/$distro/main/"*.deb 2>/dev/null)" ] && continue
            mkdir -p "dists/$distro/main/binary-amd64"
            dpkg-scanpackages --multiversion "pool/$distro/main" > "dists/$distro/main/binary-amd64/Packages"
            gzip -9kf "dists/$distro/main/binary-amd64/Packages"
          done

      - name: Generate Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            apt-ftparchive release \
              -o APT::FTPArchive::Release::Origin="DayDve" \
              -o APT::FTPArchive::Release::Label="DayDve apt repo" \
              -o "APT::FTPArchive::Release::Suite=$distro" \
              -o "APT::FTPArchive::Release::Codename=$distro" \
              -o "APT::FTPArchive::Release::Architectures=amd64" \
              -o "APT::FTPArchive::Release::Components=main" \
              "dists/$distro" > "dists/$distro/Release"
          done

      - name: Sign Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            pushd "dists/$distro"
            gpg --batch --yes --detach-sign --armor -o Release.gpg Release
            gpg --batch --yes --clearsign -o InRelease Release
            popd
          done

      - name: Export public key
        run: |
          KEYID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$KEYID" > apt-key.asc

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy build $GITHUB_RUN_NUMBER"
          git push
