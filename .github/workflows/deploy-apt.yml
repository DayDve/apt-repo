name: Deploy apt repository

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: apt

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Import GPG key
        env:
          KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/gpg.key
          gpg --batch --yes --import /tmp/gpg.key

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pool/main
          gh release list --repo ${{ github.repository }} --json tagName --jq '.[].tagName' | while read tag; do
            gh release download "$tag" --repo ${{ github.repository }} --dir pool/main --pattern '*.deb' 2>/dev/null || true
          done

      - name: Generate Packages
        run: |
          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages --multiversion pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9kf dists/stable/main/binary-amd64/Packages

      - name: Generate Release
        run: |
          cd dists/stable
          apt-ftparchive release . > Release
          cd ../..

      - name: Sign Release
        run: |
          cd dists/stable
          gpg --batch --yes --detach-sign --armor -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release
          cd ../..

      - name: Export public key
        run: |
          gpg --armor --export daydve@smbit.pro > apt-key.asc

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy apt repo build ${{ github.run_number }}"
          git push
