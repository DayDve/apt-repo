name: Deploy apt repository

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: apt

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Import GPG key
        env:
          KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/gpg.key
          gpg --batch --yes --import /tmp/gpg.key

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pool/noble/main
          gh release list --repo $GITHUB_REPOSITORY --json tagName --jq '.[].tagName' | while read tag; do
            gh release download "$tag" --repo $GITHUB_REPOSITORY --dir pool/noble/main --pattern '*.deb' 2>/dev/null || true
          done

      - name: Generate Packages
        run: |
          mkdir -p dists/noble/main/binary-amd64
          dpkg-scanpackages --multiversion pool/noble/main > dists/noble/main/binary-amd64/Packages
          gzip -9kf dists/noble/main/binary-amd64/Packages

      - name: Generate Release
        run: |
          apt-ftparchive release \
            -o APT::FTPArchive::Release::Origin="DayDve" \
            -o APT::FTPArchive::Release::Label="DayDve apt repo" \
            -o APT::FTPArchive::Release::Suite="noble" \
            -o APT::FTPArchive::Release::Codename="noble" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            dists/noble > dists/noble/Release

      - name: Sign Release
        run: |
          cd dists/noble
          gpg --batch --yes --detach-sign --armor -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Export public key
        run: |
          KEYID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$KEYID" > apt-key.asc

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy build $GITHUB_RUN_NUMBER"
          git push
