name: Deploy apt repository

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: apt

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Import GPG key
        env:
          KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/gpg.key
          gpg --batch --yes --import /tmp/gpg.key

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/by-tag
          gh release list --repo $GITHUB_REPOSITORY --json tagName --jq '.[].tagName' | while read tag; do
            gh release download "$tag" --repo $GITHUB_REPOSITORY --dir "/tmp/by-tag/$tag" --pattern '*.deb' 2>/dev/null || true
          done

      - name: Generate Packages
        run: |
          > /tmp/tag-map
          > /tmp/pool-map-entries
          for tag_dir in /tmp/by-tag/*/; do
            [ -d "$tag_dir" ] || continue
            tag=$(basename "$tag_dir")
            for deb in "$tag_dir"*.deb; do
              [ -f "$deb" ] || continue
              name=$(basename "$deb")
              usc=$(echo "$name" | tr -cd '_' | wc -c)
              if [ "$usc" -ge 2 ]; then
                distro=$(echo "$name" | rev | cut -d_ -f2 | rev)
              else
                distro=noble
              fi
              mkdir -p "/tmp/pool/$distro/main"
              cp "$deb" "/tmp/pool/$distro/main/$name"
              echo "$distro|$name|$tag" >> /tmp/tag-map
            done
          done

          for distro_dir in /tmp/pool/*/; do
            [ -d "$distro_dir" ] || continue
            distro=$(basename "$distro_dir")
            [ -z "$(ls "/tmp/pool/$distro/main/"*.deb 2>/dev/null)" ] && continue

            cd "/tmp/pool/$distro"
            dpkg-scanpackages --multiversion main > Packages

            # rewrite Filename to full relative path from repo root
            sed -i "s|^Filename: main/|Filename: pool/$distro/main/|" Packages

            mkdir -p "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64"
            cp Packages "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64/Packages"
            gzip -9kf "$GITHUB_WORKSPACE/dists/$distro/main/binary-amd64/Packages"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Generate pool map
        run: |
          echo -n '{' > "$GITHUB_WORKSPACE/pool-map.json"
          first=true
          while IFS='|' read -r _distro deb_name tag; do
            $first || echo -n ',' >> "$GITHUB_WORKSPACE/pool-map.json"
            first=false
            printf '"%s":"%s"' "$deb_name" "$tag" >> "$GITHUB_WORKSPACE/pool-map.json"
          done < /tmp/tag-map
          echo '}' >> "$GITHUB_WORKSPACE/pool-map.json"

      - name: Generate Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            apt-ftparchive release \
              -o APT::FTPArchive::Release::Origin="DayDve" \
              -o APT::FTPArchive::Release::Label="DayDve apt repo" \
              -o "APT::FTPArchive::Release::Suite=$distro" \
              -o "APT::FTPArchive::Release::Codename=$distro" \
              -o "APT::FTPArchive::Release::Architectures=amd64" \
              -o "APT::FTPArchive::Release::Components=main" \
              "dists/$distro" > "dists/$distro/Release"
          done

      - name: Sign Release
        run: |
          for distro in dists/*/; do
            [ -d "$distro" ] || continue
            distro=$(basename "$distro")
            pushd "dists/$distro"
            gpg --batch --yes --detach-sign --armor -o Release.gpg Release
            gpg --batch --yes --clearsign -o InRelease Release
            popd
          done

      - name: Export public key
        run: |
          KEYID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$KEYID" > apt-key.asc

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf dists/noble/main/binary-i386 2>/dev/null || true
          git add -A
          git commit -m "deploy build $GITHUB_RUN_NUMBER"
          git push
